<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Y Stainer Pressure Drop Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card card">
    <div class="card-header">
      <div style="font-size:1.5rem; font-weight:800; letter-spacing:1px;">⚙ Y STAINER</div>
      <h4 class="mt-1">Pressure Drop Calculator</h4>
      <div class="subtitle">Sign in to your account</div>
    </div>
    <div class="card-body p-4">

      {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-primary btn-lg fw-bold">Login</button>
        </div>
      </form>

      <hr class="my-3">
      <p class="text-center text-muted mb-0" style="font-size:.85rem;">
        Don't have an account?
        <a href="/signup" class="text-primary fw-semibold">Create one</a>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
